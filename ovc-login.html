<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVC 로그인</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #061016;
      color: #fff;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    .login-screen {
      display: grid;
      grid-template-columns: 7fr 3fr;
      min-height: 100vh;
      background: #061016;
    }

    .logo-panel {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      background: #061016;
      overflow: hidden;
    }

    .logo-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 48%, transparent 45%, rgba(0, 0, 0, 0.22) 100%);
      pointer-events: none;
    }

    .logo-panel img {
      width: min(92%, 900px);
      max-height: 94vh;
      object-fit: contain;
      filter: drop-shadow(0 22px 32px rgba(0, 0, 0, 0.42));
    }

    .form-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px;
      background: #061016;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }

    .login-box {
      width: min(100%, 340px);
    }

    .login-box h1 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .login-box p {
      margin: 0 0 30px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.5;
    }

    .field {
      display: block;
      margin-bottom: 14px;
    }

    .field span {
      display: block;
      margin-bottom: 7px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 13px;
      font-weight: 700;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      outline: none;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 16px;
    }

    input:focus {
      border-color: rgba(255, 255, 255, 0.78);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.12);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 54px;
    }

    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
    }

    .password-toggle {
      position: absolute;
      right: 7px;
      top: 50%;
      width: 38px;
      height: 34px;
      transform: translateY(-50%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }

    .password-toggle.is-visible {
      background: #fff;
      color: #071018;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .login-button {
      margin-top: 8px;
      background: #fff;
      color: #071018;
    }

    .signup-open-button {
      margin-top: 12px;
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.32);
    }

    .message {
      min-height: 22px;
      margin-top: 15px;
      color: #e9d46a;
      font-size: 14px;
      line-height: 1.45;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.72);
    }

    .modal-backdrop.is-open {
      display: flex;
    }

    .signup-modal {
      width: min(500px, 82vw, 82vh);
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(26px, 5vw, 48px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: #061016;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.55);
    }

    .signup-modal h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .signup-modal .hint {
      margin: 0 0 24px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      line-height: 1.5;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .signup-submit-button {
      background: #fff;
      color: #071018;
    }

    .cancel-button {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.24);
    }

    .signup-message {
      min-height: 22px;
      margin-top: 14px;
      color: #e9d46a;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .login-screen {
        grid-template-columns: 1fr;
        min-height: 100vh;
      }

      .logo-panel {
        min-height: 46vh;
      }

      .form-panel {
        min-height: 54vh;
        border-left: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
    }
  </style>
</head>
<body>
  <main class="login-screen">
    <section class="logo-panel" aria-label="OVC logo">
      <img src="이미지/ovc-fullname-logo.png" alt="Online Visang Community OVC">
    </section>

    <section class="form-panel">
      <form class="login-box" id="login-form">
        <h1>OVC</h1>
        <p>Online Visang Community</p>

        <label class="field">
          <span>이름</span>
          <input id="login-name" type="text" autocomplete="username" placeholder="한글 1~3글자">
        </label>

        <label class="field">
          <span>비밀번호</span>
          <div class="password-wrap">
            <input id="login-password" type="password" autocomplete="current-password" placeholder="4자리 이상">
            <button class="password-toggle" type="button" data-target="login-password" aria-label="비밀번호 보기">보기</button>
          </div>
        </label>

        <button class="login-button" id="login-button" type="button">로그인</button>
        <button class="signup-open-button" id="signup-open" type="button">회원가입</button>
        <div class="message" id="login-message" role="status"></div>
      </form>
    </section>
  </main>

  <div class="modal-backdrop" id="signup-backdrop" aria-hidden="true">
    <form class="signup-modal" id="signup-form">
      <h2>회원가입</h2>
      <p class="hint">이름은 한글 자음/모음 포함 1~3글자, 비밀번호는 4자리 이상 입력하세요.</p>

      <label class="field">
        <span>이름</span>
        <input id="signup-name" type="text" autocomplete="username" placeholder="예: 비상인">
      </label>

      <label class="field">
        <span>비밀번호</span>
        <div class="password-wrap">
          <input id="signup-password" type="password" autocomplete="new-password" placeholder="4자리 이상">
          <button class="password-toggle" type="button" data-target="signup-password" aria-label="비밀번호 보기">보기</button>
        </div>
      </label>

      <div class="modal-actions">
        <button class="cancel-button" id="signup-cancel" type="button">취소</button>
        <button class="signup-submit-button" id="signup-button" type="button">회원가입</button>
      </div>
      <div class="signup-message" id="signup-message" role="status"></div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="online-config.js?v=20260509a"></script>
  <script src="ovc-online.js?v=20260509a"></script>
  <script src="ovc-login.js?v=20260509a"></script>
</body>
</html>
