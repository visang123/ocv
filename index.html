<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function () {
      try {
        var q = location.search || "";
        var h = location.hash || "";
        if (
          /[?&]ovc_world=(?:1|true|yes)(?:&|$)/i.test(q) ||
          /ovc_world=(?:1|true|yes)/i.test(h) ||
          /^#world(?:=|:)?(?:1|true|yes)?$/i.test(h)
        ) {
          sessionStorage.setItem("ovcForceWorldHubV1", "1");
        }
      } catch (e) {}
    })();
  </script>
  <title>&#49885;&#47932; &#53412;&#50864;&#44592;</title>
  <link rel="stylesheet" href="style.css?v=20260510s">
</head>
<body>
  <div id="app-loading-screen" class="app-loading-screen" aria-live="polite">
    <div class="app-loading-inner">
      <img class="app-loading-logo" src="이미지/ovc-logo-loading.png" alt="OVC">
      <div class="app-loading-title">OVC</div>
      <div id="app-loading-text" class="app-loading-text">Loading...</div>
    </div>
  </div>
  <div class="viewport">
    <div class="world">
      <div class="ground">
        <img id="plant-spot" src="이미지/tilled-soil.png" alt="tilled soil">
        <img id="sprout" src="이미지/sprout.png" alt="sprout">
        <img id="plant-master" src="이미지/plant-master.png?v=20260512" alt="plant master">
        <div id="npc-bubble"></div>
        <div id="player-bubble"></div>
        <div id="player-alert">!</div>
        <img id="water-needed" src="이미지/water-needed.png" alt="water needed">
        <div id="growth-card">
          <div id="growth-fill"></div>
        </div>
        <div id="spawn-portal" aria-hidden="true"></div>
        <div id="big-tree" aria-hidden="true">
          <div class="big-tree-leaves">
            <div class="big-tree-branch branch-left"></div>
            <div class="big-tree-branch branch-right"></div>
            <div class="big-tree-branch branch-left-high"></div>
            <div class="big-tree-branch branch-right-high"></div>
            <div class="big-tree-branch branch-left-low"></div>
            <div class="big-tree-branch branch-right-low"></div>
            <div class="tree-apple" data-apple-id="apple-1"></div>
            <div class="tree-apple" data-apple-id="apple-2"></div>
            <div class="tree-apple" data-apple-id="apple-3"></div>
            <div class="tree-apple" data-apple-id="apple-4"></div>
            <div class="tree-apple" data-apple-id="apple-5"></div>
          </div>
          <div class="big-tree-trunk"></div>
          <div class="big-tree-roots"></div>
        </div>
        <div id="sign-board">&#50504;&#45236;&#54032;</div>
        <div id="guide-book">&#52293;</div>
        <img id="well" src="이미지/well.png" alt="well">
        <img id="bucket" src="이미지/bucket-empty.png" alt="bucket">
        <img id="seed" src="이미지/seed.png" alt="seed">
        <div id="seed-world-text" style="display: none" aria-hidden="true"></div>
        <div id="plant-hover-label" aria-hidden="true"></div>
        <div id="player-status" aria-live="polite"></div>
        <div id="player-name"></div>
        <img id="player" src="이미지/player-white.png" alt="&#54540;&#47112;&#51060;&#50612;">
      </div>
    </div>
  </div>
  <div id="onboarding-callout" class="onboarding-callout" style="display: none" aria-live="polite">
    <div class="onboarding-callout-panel">
      <p id="onboarding-callout-text" class="onboarding-callout-text"></p>
    </div>
  </div>
  <div
    id="movement-tutorial-overlay"
    class="movement-tutorial-overlay"
    style="display: none"
    aria-live="polite"
  >
    <div class="movement-tutorial-panel">
      <div class="movement-tutorial-text-block">
        <p id="movement-tutorial-line-move" class="movement-tutorial-text"></p>
        <p id="movement-tutorial-line-book" class="movement-tutorial-text movement-tutorial-line-book" hidden></p>
      </div>
      <div id="movement-tutorial-keys" class="movement-tutorial-keys">
        <div class="movement-tutorial-cross-row">
          <span class="movement-tutorial-cell"></span>
          <span class="movement-tutorial-cell">
            <span class="movement-tutorial-pair">
              <kbd class="movement-tutorial-kbd" aria-hidden="true">↑</kbd>
              <kbd class="movement-tutorial-kbd">W</kbd>
            </span>
          </span>
          <span class="movement-tutorial-cell"></span>
        </div>
        <div class="movement-tutorial-cross-row">
          <span class="movement-tutorial-cell">
            <span class="movement-tutorial-pair">
              <kbd class="movement-tutorial-kbd" aria-hidden="true">←</kbd>
              <kbd class="movement-tutorial-kbd">A</kbd>
            </span>
          </span>
          <span class="movement-tutorial-cell movement-tutorial-cross-mid"></span>
          <span class="movement-tutorial-cell">
            <span class="movement-tutorial-pair">
              <kbd class="movement-tutorial-kbd" aria-hidden="true">→</kbd>
              <kbd class="movement-tutorial-kbd">D</kbd>
            </span>
          </span>
        </div>
        <div class="movement-tutorial-cross-row">
          <span class="movement-tutorial-cell"></span>
          <span class="movement-tutorial-cell">
            <span class="movement-tutorial-pair">
              <kbd class="movement-tutorial-kbd" aria-hidden="true">↓</kbd>
              <kbd class="movement-tutorial-kbd">S</kbd>
            </span>
          </span>
          <span class="movement-tutorial-cell"></span>
        </div>
      </div>
    </div>
  </div>
  <div id="character-select-overlay">
    <div id="character-select-modal">
      <div class="character-preview-wrap">
        <div id="character-preview"></div>
      </div>
      <div class="character-select-content">
        <h2>캐릭터 색깔 선택</h2>
        <p>원하는 색깔을 누르면 왼쪽 캐릭터가 먼저 바뀝니다.</p>
        <div id="character-color-grid"></div>
        <button id="character-select-button" type="button">선택</button>
      </div>
    </div>
  </div>
  <div id="well-card">
    <img id="well-card-image" src="이미지/well.png" alt="well status">
    <div class="well-card-body">
      <div id="well-water-text">3/3</div>
      <div class="well-water-bar">
        <div id="well-water-fill"></div>
      </div>
    </div>
  </div>
  <div id="seed-card">
    <div id="seed-dry-gauge"></div>
    <div id="seed-dry-text"></div>
  </div>
  <div id="plant-card">
    <div id="plant-card-title" class="plant-card-title"></div>
    <div id="plant-water-text">&#49688;&#48516;&#128167;: 1/2</div>
    <div id="plant-water-bar" class="plant-water-bar">
      <div class="plant-water-segment"></div>
      <div class="plant-water-segment"></div>
      <div class="plant-water-segment"></div>
    </div>
  </div>
  <div id="guide-card">
    <button id="guide-close-button" type="button" aria-label="안내창 닫기">×</button>
    <div class="guide-page" data-page="0">
      <p>아직 내용이 없습니다!</p>
    </div>
    <div class="guide-page" data-page="1">
      <p>씨앗: 심고 물주면 새싹이 나옵니다.</p>
      <p>우물: 물 15초에 한칸 추가, 최대 3칸.</p>
      <p>새싹: 수분 관리 필요, 수분 2칸시 물 X / 수분 0칸시 물 O.</p>
      <p>사과: 맵 어딘가에 있음. 먹으면 신기한 일 일어남!!</p>
    </div>
    <div id="guide-nav">
      <button id="guide-prev" type="button">&#8249;</button>
      <span id="guide-page-text">1/1</span>
      <button id="guide-next" type="button">&#8250;</button>
    </div>
  </div>
  <button id="guide-book-button" type="button">&#52293;</button>
  <div id="seed-inventory">
    <div id="seed-count-panel" class="seed-count-panel" hidden>
      <div class="inventory-seed-icon" aria-hidden="true"></div>
      <div id="seed-count">0</div>
    </div>
  </div>
  <div id="apple-inventory">
    <div class="inventory-apple"></div>
    <div id="apple-count">0</div>
  </div>
  <div id="butterfly-inventory">
    <div class="butterfly-inventory-slot" data-color="brown">
      <div class="butterfly-inventory-icon"></div>
      <div class="butterfly-inventory-count">0</div>
    </div>
    <div class="butterfly-inventory-slot" data-color="yellow">
      <div class="butterfly-inventory-icon"></div>
      <div class="butterfly-inventory-count">0</div>
    </div>
    <div class="butterfly-inventory-slot" data-color="white">
      <div class="butterfly-inventory-icon"></div>
      <div class="butterfly-inventory-count">0</div>
    </div>
    <div id="butterfly-inventory-total">0</div>
  </div>
  <div id="multiplayer-status">멀티 초기화 중 / 로그인 1</div>
  <button id="admin-open-button" type="button" aria-label="관리자"></button>
  <div id="admin-overlay" aria-hidden="true">
    <div id="admin-modal">
      <div class="admin-header">
        <strong>계정 관리</strong>
        <button id="admin-close-button" type="button">닫기</button>
      </div>
      <div id="admin-message"></div>
      <div id="admin-account-list"></div>
      <button id="admin-refresh-button" type="button">새로고침</button>
    </div>
  </div>
  <button id="settings-button" type="button" aria-label="설정">⚙</button>
  <div id="settings-overlay" aria-hidden="true">
    <div id="settings-modal">
      <button id="tutorial-exit-button" type="button" class="settings-extra-button">튜토리얼 종료</button>
      <button id="tutorial-replay-button" type="button" class="settings-extra-button">튜토리얼 하기</button>
      <button id="change-color-button" type="button">색깔 바꾸기</button>
      <button id="logout-button" type="button">로그아웃</button>
    </div>
  </div>
  <div id="logout-confirm-overlay" aria-hidden="true">
    <div id="logout-confirm-modal">
      <p>로그아웃할까요?</p>
      <div class="logout-confirm-actions">
        <button id="logout-confirm-cancel" type="button">취소</button>
        <button id="logout-confirm-ok" type="button">로그아웃</button>
      </div>
    </div>
  </div>
  <div id="online-debug-toast" aria-live="polite"></div>
  <div id="network-debug-panel" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="online-config.js?v=20260509a"></script>
  <script src="ovc-online.js?v=20260509a"></script>
  <script>window.OVC_ENTRY = "world";</script>
  <script type="module" src="src/main.js?v=20260510s"></script>
  <script>
    (function () {
      function ovcDismissLoadingFailsafe() {
        try {
          document.body.classList.add("is-game-ready");
          var el = document.getElementById("app-loading-screen");
          if (el) el.hidden = true;
        } catch (e) {}
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", function () {
          window.setTimeout(ovcDismissLoadingFailsafe, 2000);
        });
      } else {
        window.setTimeout(ovcDismissLoadingFailsafe, 2000);
      }
      window.setTimeout(ovcDismissLoadingFailsafe, 5000);
      window.setTimeout(ovcDismissLoadingFailsafe, 12000);
      window.addEventListener("load", function () {
        window.setTimeout(ovcDismissLoadingFailsafe, 2500);
      });
    })();
  </script>
</body>
</html>
