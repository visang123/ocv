<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>온라인 비상 커뮤니티 – 세계관</title>
  <link rel="icon" type="image/png" sizes="512x512" href="이미지/favicon.png">
  <link rel="stylesheet" href="story-intro.css?v=20260524f">
</head>
<body>
  <div
    id="story-intro-overlay"
    class="story-intro-overlay"
    role="dialog"
    aria-modal="true"
    aria-live="polite"
    aria-label="세계관 소개"
  >
    <div id="story-intro-bg-stage" class="story-intro-bg-stage" hidden>
      <img
        class="story-intro-bg-img"
        src="이미지/story-intro-bg-2300.png"
        alt=""
        decoding="async"
      >
    </div>
    <div id="story-intro-text-stage" class="story-intro-text-stage">
      <div id="story-intro-lines" class="story-intro-lines" aria-live="polite"></div>
    </div>
    <p id="story-intro-hint" class="story-intro-hint" hidden>Enter 또는 클릭으로 넘기기</p>
    <div id="story-intro-wormhole-stage" class="story-intro-wormhole-stage" hidden>
      <video
        id="story-intro-wormhole"
        class="story-intro-wormhole"
        playsinline
        webkit-playsinline
        muted
        autoplay
        preload="auto"
      ></video>
    </div>
  </div>
  <script type="module" src="src/story-intro-main.js?v=20260524f"></script>
</body>
</html>
